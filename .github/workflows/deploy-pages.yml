name: Deploy report to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly refresh: re-fetch the auto-fetchable leaderboards, then redeploy.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh benchmark data (scheduled/manual runs only)
        if: github.event_name != 'push'
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        # Adapters are best-effort; any failure keeps last known-good values.
        run: python3 scripts/refresh_data.py || true

      - name: Re-inject data into pages
        run: python3 scripts/refresh_data.py --offline

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
